apiVersion: apps/v1
kind: Deployment
metadata:
  name: etcd-client
  namespace: "default"
spec:
  replicas: 2
  selector:
    matchLabels:
      app: etcd-client
  template:
    metadata:
      labels:
        app: etcd-client
    spec:
      containers:
      - name: etcd-client
        image: us-central1-docker.pkg.dev/molten-verve-216720/demo-repository/etcd-client:demo
        imagePullPolicy: Never
        # The client containers must be kept running for Antithesis to keep testing
        command: ["sleep"]
        args: ["infinity"]
        readinessProbe:
          exec:
            command:
              - /bin/true # Verify shell can run commands
          initialDelaySeconds: 5
          periodSeconds: 10
          timeoutSeconds: 1
        resources:
          limits:
            cpu: 100m
            memory: 100Mi
          requests:
            cpu: 50m
            memory: 50Mi
