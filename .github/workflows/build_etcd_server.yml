name: Build & Push etcd server

on: 
  schedule:
    # midnight on a Monday
    - cron: '0 0 * * 1' 
  workflow_dispatch:
    inputs:
      etcd_server_version:
        type: choice
        required: true
        description: The version of etcd server to build
        options:
          - v3.5.8
          - v3.5.5
          - v3.5.0
          - v3.6.3
jobs:
  manual_run:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Antithesis Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.ANTITHESIS_GAR_KEY }}

    - name: Extract metadata (tags) for Docker
      id: meta-container-image
      uses: docker/metadata-action@v5
      with:
        images: us-central1-docker.pkg.dev/molten-verve-216720/demo-repository/etcd-server
        tags: |
          type=sha
          ${{ github.event.inputs.etcd_server_version }}
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        build-args: |
          GO_VERSION=1.24.5
          REF=${{ github.event.inputs.etcd_server_version }}
        context: ./server/
        file: ./server/Dockerfile
        push: true
        tags: ${{ steps.meta-container-image.outputs.tags }}
        labels: ${{ steps.meta-container-image.outputs.labels }}

  weekly:
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        etcd_server_version: [v3.5.8, v3.5.5, v3.5.0, 3.6.3]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Antithesis Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.ANTITHESIS_GAR_KEY }}

    - name: Extract metadata (tags) for Docker
      id: meta-container-image
      uses: docker/metadata-action@v5
      with:
        images: us-central1-docker.pkg.dev/molten-verve-216720/demo-repository/etcd-server
        tags: |
          type=sha
          ${{ matrix.etcd_server_version }}
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        build-args: |
          GO_VERSION=1.24.5
          REF=${{ matrix.etcd_server_version }}
        context: ./server/
        file: ./server/Dockerfile
        push: true
        tags: ${{ steps.meta-container-image.outputs.tags }}
        labels: ${{ steps.meta-container-image.outputs.labels }}
