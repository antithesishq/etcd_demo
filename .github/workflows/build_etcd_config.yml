name: Build & Push etcd config

on: 
  schedule:
    # midnight on a Monday
    - cron: '0 0 * * 1' 
  workflow_dispatch:
    inputs:
      etcd_config_version:
        type: choice
        required: false
        description: The version of etcd config to build
        options:
          - v3.5.8
          - v3.5.5
          - v3.5.0
          - v3.6.3
jobs:
  manual_run:
    if: github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        etcd_version: ${{ (github.event_name == 'schedule' || github.event.inputs.etcd_version == '') && fromJSON('["v3.5.8", "v3.5.5", "v3.5.0", "v3.6.3"]') || fromJSON(format('["{0}"]', github.event.inputs.etcd_version)) }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Antithesis Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.ANTITHESIS_GAR_KEY }}

    - name: Extract metadata (tags) for Docker
      id: meta-container-image
      uses: docker/metadata-action@v5
      with:
        images: us-central1-docker.pkg.dev/molten-verve-216720/demo-repository/etcd-config
        tags: |
          type=sha
          ${{ github.event.inputs.etcd_config_version }}
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        build-args: |
          GO_VERSION=1.24.5
          IMAGE_TAG=${{ matrix.etcd_config_version }}
          NODE_COUNT=3
        context: ./config/
        file: ./config/Dockerfile
        push: true
        tags: ${{ steps.meta-container-image.outputs.tags }}
        labels: ${{ steps.meta-container-image.outputs.labels }}

  weekly:
    if: github.event_name == 'schedule'
    strategy:
      matrix:
        etcd_config_version: [v3.5.8, v3.5.5, v3.5.0, v3.6.3]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
    - uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Login to Antithesis Google Artifact Registry
      uses: docker/login-action@v3
      with:
        registry: us-central1-docker.pkg.dev
        username: _json_key
        password: ${{ secrets.ANTITHESIS_GAR_KEY }}

    - name: Extract metadata (tags) for Docker
      id: meta-container-image
      uses: docker/metadata-action@v5
      with:
        images: us-central1-docker.pkg.dev/molten-verve-216720/demo-repository/etcd-config
        tags: |
          type=sha
          ${{ matrix.etcd_config_version }}
    - name: Build and push
      uses: docker/build-push-action@v5
      with:
        build-args: |
          GO_VERSION=1.24.5
          IMAGE_TAG=${{ matrix.etcd_config_version }}
          NODE_COUNT=3
        context: ./config/
        file: ./config/Dockerfile
        push: true
        tags: ${{ steps.meta-container-image.outputs.tags }}
        labels: ${{ steps.meta-container-image.outputs.labels }}
